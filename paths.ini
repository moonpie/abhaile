[paths]
# Default output root for host runs (override via --output)
output_root_default = /var/lib/abhaile

# Live target root for apply (render uses for manifest target paths)
target_root = /

# Repository-relative paths
config_root = config
schemas_root = schemas

# Subdirectories under config_root
hosts_subdir = hosts
services_subdir = services

# Subdirectory names under output root
rendered_dir_name = rendered
state_dir_name = state

# Subdirectories under rendered output
# System-level configuration files (systemd-networkd, resolved, etc.) - atomic file placement
system_dir_name = system
# Software installation artifacts (packages, downloads, builds, commands) - execution required
software_dir_name = software
# User management artifacts (user/group setup, sudoers) - execution required
users_dir_name = users
# Service-specific artifacts organized per service
services_dir_name = services
