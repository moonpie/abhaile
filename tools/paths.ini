# Abhaile Path Configuration
# Single source of truth for all paths used by tools/ scripts
# This file is under version control and provides consistency across Python and Bash tooling

[repository]
# Git repository location on production hosts
repo_root = /opt/abhaile

[runtime]
# Runtime directories for GitOps operations
rendered_dir = /var/lib/abhaile/rendered
state_dir = /var/lib/abhaile/state
software_dir = /var/lib/abhaile/software
vault_token_file = /home/abhaile/.config/vault-agent/token

[development]
# Development overrides (relative to repo root)
dev_rendered_dir = out/rendered
dev_state_dir = out/state
dev_software_dir = out/software
dev_tmp_dir = tmp

[flags]
# Runtime coordination flags
apply_ready_flag = /var/lib/abhaile/rendered/.apply_ready
gitops_state_file = /var/lib/abhaile/state/gitops.state

[secrets]
# Secret storage locations
secrets_base_dir = /etc/abhaile
gitops_env_file = /etc/abhaile/gitops/.env
vault_approle_dir = /etc/abhaile/vault-agent-approle
sops_age_key_file = /home/abhaile/.config/sops/age/keys.txt
sops_age_key_file_root = /root/.config/sops/age/keys.txt

[credentials]
# Credential files
git_ssh_key = /home/abhaile/.ssh/gitops_ed25519
git_known_hosts = /home/abhaile/.ssh/known_hosts

[system]
# System configuration targets
systemd_network_dir = /etc/systemd/network
systemd_system_dir = /etc/systemd/system
systemd_resolved_conf = /etc/systemd/resolved.conf
resolv_conf = /etc/resolv.conf
sudoers_dir = /etc/sudoers.d
backup_dir = /var/lib/abhaile/backups

[containers]
# Podman quadlet directories
quadlets_rootful_dir = /etc/containers/systemd
quadlets_rootless_dir = /home/abhaile/.config/containers/systemd
