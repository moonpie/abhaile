repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      - id: end-of-file-fixer
        name: Fix End of Files
      - id: check-yaml
        name: Check YAML Syntax
      - id: check-json
        name: Check JSON Syntax
      - id: mixed-line-ending
        name: Mixed Line Endings
      - id: check-merge-conflict
        name: Check Merge Conflicts
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        name: Format YAML (yamlfmt)
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: Format Markdown (mdformat)
        files: \.md$
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        name: Format Python (black)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: Type Check Python (mypy)
        pass_filenames: false
        args: ["--config-file=pyproject.toml", "abhaile", "tests"]
        additional_dependencies: ["types-PyYAML>=6.0", "types-jsonschema>=4.23.0", "types-Jinja2>=2.11.9", "pytest>=7.4.0"]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.1
    hooks:
      - id: check-jsonschema
        name: Validate Mapping.yaml Against Schema
        files: ^config/mapping\.yaml$
        types: [yaml]
        args: ["--schemafile", "schemas/mapping.schema.json"]
      - id: check-jsonschema
        name: Validate Network.yaml Against Schema
        files: ^config/network\.yaml$
        types: [yaml]
        args: ["--schemafile", "schemas/network.schema.json"]
      - id: check-jsonschema
        name: Validate Host.yaml Files Against Schema
        files: ^config/hosts/.*/host\.yaml$
        types: [yaml]
        args: ["--schemafile", "schemas/host.schema.json"]
      - id: check-jsonschema
        name: Validate Service.yaml Files Against Schema
        files: ^config/services/.*/service\.yaml$
        types: [yaml]
        args: ["--schemafile", "schemas/service.schema.json"]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: Lint YAML (yamllint)
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.35
    hooks:
      - id: pymarkdown
        name: Lint Markdown (pymarkdown)
        args: ["-d", "md013", "scan", "."]
        files: \.md$
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        name: Lint Python (ruff)
  - repo: https://github.com/aristanetworks/j2lint.git
    rev: v1.2.0
    hooks:
      - id: j2lint
        name: Lint Jinja2 Templates (j2lint)
        files: ".*\\.j2$"
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: Lint Shell Scripts (shellcheck)
        files: ^(tools/|config/|systemd/).*\.(sh|bash)$
        args: ["--severity=warning", "--exclude=SC1091"]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: Detect Hardcoded Secrets (gitleaks)
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: golang
        pass_filenames: false
