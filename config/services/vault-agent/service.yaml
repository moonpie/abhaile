name: vault-agent
podman:
  user: abhaile
  network: host
composition:
  systemd:
    - source: vault-agent/systemd/abhaile-secrets-ready.service
      destination: /etc/systemd/system/abhaile-secrets-ready.service
    - source: vault-agent/systemd/abhaile-secrets-ready.path
      destination: /etc/systemd/system/abhaile-secrets-ready.path
      enable: true
      start: true
  vault_agent:
    base:
      source:
        template: vault-agent/config/config.hcl.j2
        variables:
          vault_addr: '%%network.services.vault.address%%'
      destination: /srv/vault/agent/config.hcl
    templates:
      - source: vault-agent/templates/ready.ctmpl
        out: .ready
        perms: '0640'
  container:
    named_volumes:
      - name: templates
        host_path: /srv/vault/agent/templates
        mount_path: /agent/templates
      - name: run
        host_path: /srv/vault/agent/run
        mount_path: /agent/run
      - name: out
        host_path: /srv/vault/agent/out
        mount_path: /agent/out
      - name: host-certs
        host_path: /etc/ssl/certs
        mount_path: /etc/ssl/certs
        mode: ro
        shared: true
    mounted_files:
      - host_path: /home/abhaile/.config/vault-agent/token
        mount_path: /agent/token
      - host_path: /srv/vault/agent/config.hcl
        mount_path: /agent/config.hcl
