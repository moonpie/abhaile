name: coredns-clean
systemd:
  network: service-32
apply:
  config_change_restart_unit: null
composition:
  include:
    - coredns-common
    - coredns-omada
  config:
    - source:
        template: coredns-common/config/Corefile.j2
        variables:
          bind_ip: '%%network.services.coredns-clean.address | strip_cidr%%'
          forward_to: 9.9.9.9 149.112.112.112 1.1.1.1 1.0.0.1
          dmz_caddy_ip: '%%network.services.caddy-dmz.address | strip_cidr%%'
      destination: /etc/coredns/Corefile
