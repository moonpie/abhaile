name: authelia
podman:
  user: root
  network: ipvlan-l2
composition:
  config:
    - source: authelia/config/users_database.yml
      destination: /srv/authelia/authelia/config/users_database.yml
    - source: authelia/systemd/authelia-config.service
      destination: /etc/systemd/system/authelia-config.service
    - source: authelia/systemd/authelia-config.path
      destination: /etc/systemd/system/authelia-config.path
    - source: authelia/systemd/authelia-redis-conf.service
      destination: /etc/systemd/system/authelia-redis-conf.service
    - source: authelia/systemd/authelia-redis-conf.path
      destination: /etc/systemd/system/authelia-redis-conf.path
  vault_agent:
    templates:
      - source: authelia/templates/authelia.configuration.yml.ctmpl
        out: authelia.configuration.yml
        perms: '0640'
      - source: authelia/templates/authelia-redis.conf.ctmpl
        out: authelia-redis.conf
        perms: '0640'
  ingress:
    internal:
      blocks:
        - authelia/caddy/internal-ingress.txt
  pod:
    containers:
      - name: authelia
        container:
          named_volumes:
            - name: config
              host_path: /srv/authelia/authelia/config
              mount_path: /config
            - name: data
              host_path: /srv/authelia/authelia/data
              mount_path: /data
            - name: host-certs
              host_path: /etc/ssl/certs
              mount_path: /etc/ssl/certs
              mode: ro
              shared: true
      - name: redis
        container:
          named_volumes:
            - name: data
              host_path: /srv/authelia/redis/data
              mount_path: /data
            - name: host-certs
              host_path: /etc/ssl/certs
              mount_path: /etc/ssl/certs
              mode: ro
              shared: true
          mounted_files:
            - host_path: /srv/authelia/redis/config/redis.conf
              mount_path: /usr/local/etc/redis/redis.conf
