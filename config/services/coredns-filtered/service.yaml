name: coredns-filtered
type: host
mode: ''
network: service-32
include:
  - coredns-common
  - coredns-omada
config:
  - source:
      template: coredns-common/config/Corefile.j2
      variables:
        bind_ip: "%%services.coredns-filtered.address | strip_cidr%%"
        forward_to: "%%services.blocky.address | strip_cidr%%:8053"
        omada_ip: "%%services.omada-controller.address | strip_cidr%%"
        dmz_caddy_ip: "%%services.caddy-dmz.address | strip_cidr%%"
    destination: /etc/coredns/Corefile
