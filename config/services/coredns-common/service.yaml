name: coredns-common
composition:
  systemd:
    - source: coredns-common/systemd/coredns-zones.path
      destination: /etc/systemd/system/coredns-zones.path
      enable: true
      start: true
    - source: coredns-common/systemd/coredns-zones.service
      destination: /etc/systemd/system/coredns-zones.service
  dns:
    zone_files:
      - zone: '*'
        file:
          source:
            template: coredns-common/config/zones/zone.zone.j2
            variables: {}
          destination: /etc/coredns/zones/zone.zone
