id: gasket-dkms
name: "Build and install gasket-dkms"
description: "Prepare Google's Coral EdgeTPU repo, build gasket-dkms, and ensure apex devices have the right permissions"
commands:
  - 'tmpdir=$(mktemp -d) && pushd "$tmpdir" >/dev/null'
  - 'wget https://packages.cloud.google.com/apt/doc/apt-key.gpg'
  - 'gpg --no-default-keyring --keyring ./temp-keyring.gpg --import apt-key.gpg'
  - 'gpg --no-default-keyring --keyring ./temp-keyring.gpg --export --output google-apt.gpg'
  - 'popd >/dev/null && sudo install -Dm644 "$tmpdir/google-apt.gpg" /etc/apt/keyrings/google-apt.gpg && rm -rf "$tmpdir"'
  - 'echo "deb [signed-by=/etc/apt/keyrings/google-apt.gpg] https://packages.cloud.google.com/apt coral-edgetpu-stable main" | sudo tee /etc/apt/sources.list.d/coral-edgetpu.list'
  - 'mkdir -p "$HOME/git" && cd "$HOME/git"'
  - 'if [ ! -d gasket-builder ]; then git clone https://github.com/jnicolson/gasket-builder.git; fi'
  - 'cd gasket-builder'
  - 'git pull --ff-only || true'
  - "sed -i 's#FROM ubuntu:24.04#FROM docker.io/library/debian:trixie#' Dockerfile"
  - 'podman build --output . .'
  - 'sudo apt-get update'
  - 'sudo apt-get install -y ./gasket-dkms*.deb edgetpu-runtime libedgetpu1-std python3-pycoral'
  - 'rm -f ./gasket-dkms*.deb'
  - 'echo "SUBSYSTEM==\"apex\", MODE=\"0660\", GROUP=\"apex\"" | sudo tee /etc/udev/rules.d/65-apex.rules'
  - 'sudo udevadm control --reload && sudo udevadm trigger --subsystem-match=apex || true'
