---
# Common user configuration for all hosts
# Generates useradd, usermod, and sudoers files

users:
  abhaile:
    uid: 1001
    primary_group: abhaile
    home: /home/abhaile
    shell: /bin/bash
    description: "Abhaile service account"
    ssh_authorized_keys:
      # SSH public keys for remote management
      # Format: "ssh-rsa AAAA... user@host" or "ssh-ed25519 AAAA... user@host"
      # Example (replace with actual keys):
      # - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM... moonpie@laptop"
      - []

groups:
  abhaile:
    gid: 1001
  apex:
    # For Coral TPU access (phobos only, but defined here for idempotency)
    gid: 1002
  sudo:
    # For sudoers access (all hosts)
    gid: 27

sudoers:
  - name: abhaile
    rules:
      - "abhaile  ALL=(ALL) NOPASSWD:ALL"
      - "# Abhaile system account - unrestricted access"
