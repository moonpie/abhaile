[paths]
# Default output root for host runs (override via --output)
output_root_default = /var/lib/abhaile

# Live target root for apply (render uses for manifest target paths)
target_root = /

# Repository-relative paths
config_root = config
schemas_root = schemas

# Subdirectories under config_root
hosts_subdir = hosts
services_subdir = services

# Subdirectory names under output root
rendered_dir_name = rendered
state_dir_name = state
# Subdirectories under rendered output (systemd configuration)
systemd_networkd_dir = systemd-networkd
systemd_resolved_dir = systemd-resolved
systemd_units_dir = systemd-units
