name: CI Validate

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check (bash -n)
        run: |
          set -euo pipefail
          # Find all shell scripts and run `bash -n` to check syntax
          while IFS= read -r -d '' f; do
            echo "Checking syntax: $f"
            bash -n "$f"
          done < <(find . -type f -name '*.sh' -print0)

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pre-commit pytest pytest-cov

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-commit (includes security checks)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run unit tests (fast)
        run: |
          pytest tests/unit/ -v --cov=tools/lib --cov-report=term-missing -m "not slow"

      - name: Run integration tests (no slow)
        run: |
          pytest tests/integration/ tests/performance/ -v -m "not slow"

      - name: Render configs (all hosts)
        run: |
          python tools/render/render.py

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: "detect --source . --redact"

      - name: Trivy security scan (high/critical)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Validate systemd units
        run: |
          find out/rendered -type f \( -name '*.network' -o -name '*.netdev' \) -print0 | xargs -0 -r systemd-analyze --system verify
        if: success()

      - name: Validate quadlet syntax
        run: |
          echo "Checking quadlet files for [Unit] section..."
          find out/rendered -type f \( -name '*.container' -o -name '*.volume' -o -name '*.network' -o -name '*.build' \) | while read -r file; do
            if ! grep -q '^\[Unit\]' "$file"; then
              echo "ERROR: Quadlet missing [Unit] section: $file"
              exit 1
            fi
          done
        if: success()

      - name: Network validation (IP uniqueness, VLAN consistency)
        run: |
          python tools/lib/utils.py validate-network
        if: success()
