# External sources
pool pool.ntp.org iburst
pool time.google.com iburst

# Local LAN allowance
allow 172.20.0.0/16

# Local clock fallback (stratum 10)
local stratum 10

# Peer with chrony-b
peer 172.20.20.238 iburst

# Step on large initial offset
makestep 1.0 3
rtcsync

# Logging
logdir /var/log/chrony
log measurements statistics tracking
