# Bind to specific IP
bindaddress 172.20.20.238/32

# External sources
pool pool.ntp.org iburst
pool time.google.com iburst

# Local LAN allowance
allow 172.20.0.0/16

# Local clock fallback
local stratum 11

# Peer with chrony-a
peer 172.20.20.237/32 iburst

# Step on large initial offset
makestep 1.0 3
rtcsync

# Logging
logdir /var/log/chrony
log measurements statistics tracking
